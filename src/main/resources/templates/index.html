<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .card-header {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Student Management Dashboard</h2>
    </div>

    <!-- ALERT -->
    <div id="alertBox" class="alert alert-success d-none"></div>

    <!-- STATS -->
    <div class="row mb-4 text-center">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Total Students</h5>
                <h3 id="totalStudents">0</h3>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Average Age</h5>
                <h3 id="avgAge">0</h3>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- ADD / EDIT STUDENT -->
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">
                    <h5 id="formTitle">Add Student</h5>
                </div>
                <div class="card-body">

                    <form id="studentForm" action="/students/add" method="post">

                        <input type="hidden" name="id" id="studentId"/>

                        <div class="mb-3">
                            <label>Name</label>
                            <input name="name" id="name" type="text" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label>Age</label>
                            <input name="age" id="age" type="number" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label>Course</label>
                            <input name="course" id="course" type="text" class="form-control" required />
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                            Add Student
                        </button>

                    </form>

                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header d-flex justify-content-between">
                    <h5>Student List</h5>
                    <input type="text" id="searchInput" class="form-control w-50" placeholder="Search...">
                </div>

                <div class="card-body">

                    <table class="table table-hover" id="studentTable">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Course</th>
                            <th>Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="student : ${students}">
                            <td th:text="${student.id}" class="sid"></td>
                            <td th:text="${student.name}" class="sname"></td>
                            <td th:text="${student.age}" class="sage"></td>
                            <td th:text="${student.course}" class="scourse"></td>
                            <td>

                                <!-- EDIT -->
                                <button class="btn btn-sm btn-warning editBtn">
                                    <i class="fas fa-edit"></i>
                                </button>

                                <!-- DELETE -->
                                <form th:action="@{/students/delete}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${student.id}" />
                                    <button class="btn btn-sm btn-danger deleteBtn">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>

                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="5" class="text-center text-muted">No students</td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // 🔍 SEARCH FILTER
    document.getElementById("searchInput").addEventListener("keyup", function () {
        let value = this.value.toLowerCase();
        document.querySelectorAll("#studentTable tbody tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
        });
    });

    // 📊 STATS CALCULATION
    function updateStats() {
        let rows = document.querySelectorAll("#studentTable tbody tr");
        let total = 0;
        let ageSum = 0;

        rows.forEach(row => {
            if (row.style.display !== "none") {
                let age = parseInt(row.querySelector(".sage")?.innerText || 0);
                if (!isNaN(age)) {
                    total++;
                    ageSum += age;
                }
            }
        });

        document.getElementById("totalStudents").innerText = total;
        document.getElementById("avgAge").innerText = total ? (ageSum / total).toFixed(1) : 0;
    }

    updateStats();

    // ✏️ EDIT FUNCTION
    document.querySelectorAll(".editBtn").forEach(btn => {
        btn.addEventListener("click", function () {
            let row = this.closest("tr");

            document.getElementById("studentId").value = row.querySelector(".sid").innerText;
            document.getElementById("name").value = row.querySelector(".sname").innerText;
            document.getElementById("age").value = row.querySelector(".sage").innerText;
            document.getElementById("course").value = row.querySelector(".scourse").innerText;

            document.getElementById("formTitle").innerText = "Edit Student";
            document.getElementById("submitBtn").innerText = "Update Student";

            showAlert("Editing student. Update and submit.", "info");
        });
    });

    // 🔔 ALERT FUNCTION
    function showAlert(message, type = "success") {
        let alertBox = document.getElementById("alertBox");
        alertBox.className = "alert alert-" + type;
        alertBox.innerText = message;
        alertBox.classList.remove("d-none");

        setTimeout(() => {
            alertBox.classList.add("d-none");
        }, 3000);
    }

    // 🔔 DELETE ALERT
    document.querySelectorAll(".deleteBtn").forEach(btn => {
        btn.addEventListener("click", function () {
            showAlert("Student deleted successfully!");
        });
    });

    // 🔔 FORM SUBMIT ALERT
    document.getElementById("studentForm").addEventListener("submit", function () {
        showAlert("Student saved successfully!");
    });

    // Recalculate stats after filtering
    document.getElementById("searchInput").addEventListener("keyup", updateStats);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
